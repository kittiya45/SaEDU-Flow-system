<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ระบบเสนอเอกสาร กนค.</title>
<link rel="icon" type="image/png" href="img/Logo.png">
<link rel="preconnect" href="https://jrubupvzltxqstzcpoov.supabase.co">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://unpkg.com">
<script>
  window.tailwind = window.tailwind || {};
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          thai: ['"Noto Sans Thai"', 'system-ui', 'sans-serif'],
          mono: ['"IBM Plex Mono"', '"Courier New"', 'monospace'],
        },
        colors: {
          brand:      { DEFAULT:'#E83A00', h:'#C03200', light:'#fff5f0', mid:'#ffc9a8', pale:'#fff8f4' },
          navy:       '#100800',
          app:        '#F4F2EF',
          card:       '#FFFFFF',
          'app-text': { DEFAULT:'#18120E', 2:'#6b6560', 3:'#a89e99' },
          border:     '#EBEBEB',
        },
      }
    }
  }
</script>
<script src="https://cdn.tailwindcss.com" defer></script>
<script src="https://unpkg.com/lucide@latest" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>

<!-- Supabase Auth client (เวอร์ชันตรึงไว้ — แอปนี้ไม่มี build step ที่จะจับ breaking update ของ CDN ได้) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js"></script>

<!-- ตั้งค่า API, ตัวแปรหลัก และสิทธิ์ใช้งาน -->
<script src="config.js?v=5" defer></script>

<!-- รวมฟังก์ชันช่วยจัดการหน้าจอและแจ้งเตือน -->
<script src="utils.js?v=2" defer></script>

<!-- ตัวดักจับการคลิกและส่งคำสั่งจัดการหน้าเว็บ -->
<script src="events.js?v=2" defer></script>

<!-- ระบบ Login และจัดการเซสชันผู้ใช้ -->
<script src="auth.js?v=4" defer></script>

<!-- หน้าสรุปผลและรายการงานล่าสุด -->
<script src="dashboard.js?v=10" defer></script>

<!-- ตารางรายการเอกสารและการค้นหา -->
<script src="docList.js?v=2" defer></script>

<!-- ฟอร์มสร้าง/แก้ไขเอกสารและอัปโหลดไฟล์ -->
<script src="docForm.js?v=2" defer></script>

<!-- ระบบอนุมัติ ตีกลับ และส่งต่อเอกสาร -->
<script src="workflow.js?v=2" defer></script>

<!-- ประวัติเอกสารและดาวน์โหลดรายงาน CSV -->
<script src="report.js?v=2" defer></script>

<!-- modal อนุมัติ/ส่งคืน และ signature placement (ต้องโหลดก่อน docDetail) -->
<script src="docSign.js?v=2" defer></script>

<!-- หน้าแสดงรายละเอียดเอกสาร อนุมัติ/ตีกลับ และฝังลายเซ็นใน PDF -->
<script src="docDetail.js?v=2" defer></script>

<!-- ออกเลขที่หนังสือขาออก (สร้างเลขอัตโนมัติในรูปแบบ SPPTNNN หรือ SPPTNNN-CC) -->
<script src="docNum.js?v=2" defer></script>

<!-- ส่งอีเมลแจ้งเตือนผ่าน Edge Function และตรวจเอกสารที่เลยกำหนด -->
<script src="notif.js?v=2" defer></script>

<!-- หน้าต่างเปิดดูไฟล์ PDF และรูปภาพ -->
<script src="viewer.js?v=2" defer></script>

<!-- เครื่องมือแก้ไข PDF และใส่ลายเซ็น -->
<script src="editor.js?v=2" defer></script>

<!-- กราฟสถิติและติดตามงานค้าง -->
<script src="stats.js?v=4" defer></script>

<!-- หน้าจัดการระบบ: เลขที่เอกสาร -->
<script src="sysAdmin.js?v=10" defer></script>

<!-- หน้าจัดการระบบ: ประเภทเอกสาร-->
<script src="docTypeAdmin.js?v=2" defer></script>

<!-- แบบฟอร์มดาวน์โหลด -->
<script src="templates.js?v=2" defer></script>

<!-- จัดการผู้ใช้งาน: อนุมัติบัญชี แก้ไขข้อมูล รีเซ็ตรหัสผ่าน เพิ่มอาจารย์ -->
<script src="admin.js?v=2" defer></script>

<!-- นำเข้าผู้ใช้หลายคนพร้อมกันจากไฟล์ CSV (เฉพาะ ROLE-SYS) -->
<script src="adminImport.js?v=2" defer></script>

<!-- จัดการโครงสร้างเมนูและหน้าตาเว็บหลัก -->
<script src="layout.js?v=3" defer></script>

<!-- ตัวเริ่มรันระบบ — เช็ค session ที่ค้างไว้ก่อน (Supabase Auth) ถ้าไม่มีค่อยเรียกหน้า Login -->
<script src="boot.js?v=3" defer></script>

</body>
</html>
